name: runtime-introspection
description: Read-only runtime introspection for live schema, routes, endpoints, and logs. Local and non-production only.
operations:
  - id: describe-schema
    tool: runtime_describe_schema
    inputs:
      - name: target
        type: string
        required: false
    outputs:
      - name: schema
        type: string
  - id: list-routes
    tool: runtime_list_routes
    inputs:
      - name: service
        type: string
        required: false
    outputs:
      - name: routes
        type: string
  - id: tail-logs
    tool: runtime_tail_logs
    inputs:
      - name: query
        type: string
        required: false
      - name: limit
        type: number
        required: false
    outputs:
      - name: lines
        type: string
